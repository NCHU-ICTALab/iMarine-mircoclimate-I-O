time_step_minutes: 60
lookback_hours: 12
horizon_minutes: 120
anchor_offsets_minutes:
  - 30
  - 60
  - 90
  - 120

targets:
  wind_speed_gust:
    variables: [wind_speed, wind_gust]
    model_type: multitask_lstm
  precipitation:
    variables: [precipitation_1hr]
    model_type: twostage_lstm
    lookback_hours: 12
    loss:
      type: focal_bce_plus_mse
      focal_alpha: 0.75
      focal_gamma: 2.0
      lambda_reg: 0.8
    rain_threshold_main: 1.0
    rain_threshold_heavy: 10.0
    use_weighted_sampler: true
    inference_cls_threshold: 0.5
  tide_level:
    variables: [tide_level]
    model_type: lstm
  visibility:
    variables: [visibility]
    model_type: lstm
    skip_if_missing: true

model:
  hidden_size_1: 64
  hidden_size_2: 32
  dropout: 0.2

training:
  batch_size: 8
  max_epochs: 150
  learning_rate: 0.0005
  early_stopping_patience: 20
  early_stopping_min_delta: 0.0001
  lr_scheduler:
    type: ReduceLROnPlateau
    patience: 8
    factor: 0.5
    min_lr: 0.00001
  gradient_clip: 1.0
  random_seed: 42
  finetune_lr: 0.00005
  finetune_epochs: 30

data:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  min_valid_ratio: 0.0

qpesums:
  enabled: false
  port_lat: 22.62
  port_lon: 120.28
  search_radius: 0.1
  qpe_dataid: O-A0002-001
  qpf_dataid:
  cache_ttl_seconds: 600

features:
  spatial_rain:
    enabled: true
    dataid: O-A0002-001
    radius_km: 30
    top_n: 3
  cwa_forecast:
    enabled: true
    dataid: F-D0047-065
    location_name: 鼓山區
    cache_ttl_sec: 3600

rain_postprocess:
  enabled: true
  enforce_pure_temporal_lstm: true
  lookback_hours: 12
  nearby_precip:
    enabled: true
    mode: radius
    station_ids: []
    radius_km: 10
    single_station_trigger_mm: 0.5
    single_station_min_probability: 0.70
    mean_trigger_mm: 2.0
    mean_min_probability: 0.85
    dry_suppression_probability: 0.15
  cwa_pop3h:
    enabled: true
    api_key_env: CWA_API_KEY
    location_candidates: [前鎮區, 鼓山區, 苓雅區, 三民區, 鹽埕區, 小港區]
    fallback_location: 前鎮區
    cache_minutes: 30
    normalize_percent: true
    high_pop_trigger: 0.60
    high_pop_weight_for_rule: 0.80
    low_pop_trigger: 0.10
  blending:
    enabled: true
    H1: {lstm_weight: 1.0, cwa_weight: 0.0}
    H2: {lstm_weight: 1.0, cwa_weight: 0.0}
    H3: {lstm_weight: 0.5, cwa_weight: 0.5, cwa_source: current}
    H4: {lstm_weight: 0.3, cwa_weight: 0.7, cwa_source: next}
  probability_clip:
    min: 0.0
    max: 1.0
  warning_thresholds:
    watch: 0.30
    warning: 0.50
    stop: 0.70
